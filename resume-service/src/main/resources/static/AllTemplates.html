<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Templates | MySimpleResume</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0d0d12;
            --surface: rgba(20, 20, 35, 0.85);
            --muted: #8b8fa8;
            --accent: #6c63ff;
            --accent2: #ff6584;
        }

        body { font-family: 'Inter', sans-serif; background: var(--ink); min-height: 100vh; color: #fff; overflow-x: hidden; }

        .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.2; animation: floatOrb 14s ease-in-out infinite; }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #6c63ff, transparent 70%); top: -200px; left: -150px; }
        .orb-2 { width: 450px; height: 450px; background: radial-gradient(circle, #ff6584, transparent 70%); bottom: -150px; right: -100px; animation-delay: -6s; }
        .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #43e97b, transparent 70%); top: 40%; right: 20%; opacity: 0.1; animation-delay: -10s; }
        @keyframes floatOrb { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-40px) scale(1.05); } 66% { transform: translate(-20px,20px) scale(0.97); } }
        .bg-canvas::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 32px 32px; }

        .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: rgba(255,255,255,0.4); border-radius: 50%; animation: riseUp linear infinite; }
        @keyframes riseUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 8% { opacity: 1; } 92% { opacity: 1; } 100% { transform: translateY(-5vh) scale(1); opacity: 0; } }

        .page { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }

        /* ── Nav ── */
        .topnav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; animation: fadeUp 0.5s 0.1s both; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.25s ease; }
        .back-btn:hover { background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.35); color: #fff; transform: translateX(-3px); }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #6c63ff, #ff6584); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 6px 20px rgba(108,99,255,0.4); }
        .brand-name { font-size: 0.95rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }

        /* ── Hero ── */
        .hero { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s 0.2s both; }
        .hero-tag { display: inline-block; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.25); color: #a594ff; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 16px; border-radius: 50px; margin-bottom: 20px; }
        .hero h1 { font-size: 2.8rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.04em; margin-bottom: 14px; }
        .hero h1 .grad { background: linear-gradient(90deg, #6c63ff, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--muted); font-size: 0.95rem; font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.6; }

        /* ── Controls ── */
        .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; animation: fadeUp 0.6s 0.3s both; }
        .search-wrap { flex: 1; min-width: 220px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; padding: 10px 16px; transition: border-color 0.2s, box-shadow 0.2s; }
        .search-wrap:focus-within { border-color: rgba(108,99,255,0.5); box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
        .search-wrap input { flex: 1; background: none; border: none; outline: none; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.88rem; }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.2); }

        /* Filter buttons — rendered dynamically */
        #filterButtons { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; color: var(--muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; white-space: nowrap; }
        .filter-btn:hover { background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.3); color: #a594ff; }
        .filter-btn.active { background: rgba(108,99,255,0.18); border-color: rgba(108,99,255,0.45); color: #fff; }

        /* ── Results ── */
        .results-bar { display: flex; align-items: center; margin-bottom: 24px; animation: fadeUp 0.6s 0.35s both; }
        .results-count { font-size: 0.82rem; color: var(--muted); }
        .results-count span { color: #a594ff; font-weight: 700; }

        /* ── Grid ── */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 24px; min-height: 300px; }

        /* ── Card ── */
        .tpl-card { background: rgba(20,20,35,0.7); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 22px; overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.22,1,0.36,1); position: relative; animation: fadeUp 0.5s both; }
        .tpl-card:hover { border-color: rgba(108,99,255,0.5); transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(108,99,255,0.2); }

        .tpl-preview { width: 100%; height: 210px; position: relative; overflow: hidden; background: #1a1a2e; }
        .tpl-preview img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; transition: transform 0.4s ease; }
        .tpl-card:hover .tpl-preview img { transform: scale(1.04); }

        .img-skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease infinite; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .img-skeleton .sk-icon { font-size: 2rem; opacity: 0.15; }
        .img-skeleton .sk-text { font-size: 0.72rem; color: rgba(255,255,255,0.12); }

        .preview-overlay { position: absolute; inset: 0; background: rgba(108,99,255,0.88); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; opacity: 0; transition: opacity 0.25s ease; pointer-events: none; }
        .tpl-card:hover .preview-overlay { opacity: 1; }
        .preview-overlay .ov-icon { font-size: 1.8rem; }
        .preview-overlay .ov-text { font-size: 0.9rem; font-weight: 700; color: #fff; }

        .tpl-footer { padding: 18px 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .tpl-name { font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 3px; }
        .tpl-category { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
        .tpl-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .tpl-tag-pill { padding: 2px 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; font-size: 0.65rem; color: var(--muted); }
        .preview-btn { padding: 8px 16px; background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); border-radius: 8px; color: #a594ff; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: 'Inter', sans-serif; flex-shrink: 0; }
        .preview-btn:hover { background: linear-gradient(135deg, #6c63ff, #9b59f5); border-color: transparent; color: #fff; box-shadow: 0 4px 14px rgba(108,99,255,0.4); }

        /* States */
        .loading-state, .empty-state, .error-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 80px 20px; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(108,99,255,0.2); border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-icon { font-size: 3rem; opacity: 0.4; }
        .state-title { font-size: 1rem; font-weight: 700; color: #fff; }
        .state-sub { font-size: 0.85rem; color: var(--muted); max-width: 320px; line-height: 1.5; }
        .retry-btn { padding: 10px 24px; background: linear-gradient(135deg, #6c63ff, #9b59f5); border: none; border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(108,99,255,0.4); }

        /* Pagination */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 48px; }
        .page-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; color: var(--muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .page-btn:hover { background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.4); color: #fff; }
        .page-btn.active { background: linear-gradient(135deg, #6c63ff, #9b59f5); border-color: transparent; color: #fff; box-shadow: 0 4px 14px rgba(108,99,255,0.4); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .page-dots { color: var(--muted); padding: 0 6px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 640px) { .hero h1 { font-size: 2rem; } .grid { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="particles" id="particles"></div>

<div class="page">

    <div class="topnav">
        <a class="back-btn" href="templates.html">← Back</a>
        <div class="brand">
            <div class="brand-icon">📄</div>
            <div class="brand-name">MySimpleResume</div>
        </div>
    </div>

    <div class="hero">
        <div class="hero-tag">✦ Full Template Library</div>
        <h1>All <span class="grad">templates</span></h1>
        <p>Browse every template in our collection. Click any to preview and select it for your resume.</p>
    </div>

    <div class="controls">
        <div class="search-wrap">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search by name, category or tag..." oninput="applyFilters()" />
        </div>
        <!--
            Filter buttons are injected dynamically by buildFilterButtons()
            after the API responds — one button per unique category + "All".
        -->
        <div id="filterButtons"></div>
    </div>

    <div class="results-bar">
        <div class="results-count">Showing <span id="resultCount">0</span> templates</div>
    </div>

    <div class="grid" id="templateGrid">
        <div class="loading-state">
            <div class="spinner"></div>
            <div class="state-sub">Loading templates...</div>
        </div>
    </div>

    <div class="pagination" id="pagination" style="display:none;"></div>

</div>

<script>
    const BASE_URL = "http://localhost:8080";
    /* ── Particles ── */
    const pContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*-18}s;`;
        pContainer.appendChild(p);
    }

    /* ── State ── */
    let allTemplates      = [];
    let filteredTemplates = [];
    let currentFilter     = 'all';
    const ITEMS_PER_PAGE  = 12;
    let currentPage       = 1;

    /* ── Fetch all templates ──
     * GET /get/all/templates
     * { allTemplates: [ { templateName, puppeteerTemplatePath, displayName, category, description, tags, previewImage } ] }
     */
    async function loadAllTemplates() {
        try {
            const res = await fetch(`${BASE_URL}/get/all/templates`);
            if (!res.ok) throw new Error('Server error');
            const data = await res.json();
            allTemplates = data.allTemplates || [];

            /* Build filter buttons from unique categories returned by the API */
            buildFilterButtons();
            applyFilters();
        } catch (err) {
            showError();
        }
    }

    /* ── Build filter buttons dynamically from API categories ──
     * Always starts with "All", then one button per unique category value.
     * No category names are hardcoded here.
     */
    function buildFilterButtons() {
        const uniqueCategories = [...new Set(
            allTemplates.map(t => t.category).filter(Boolean)
        )];

        const buttons = ['all', ...uniqueCategories];

        document.getElementById('filterButtons').innerHTML = buttons.map(cat => `
            <button class="filter-btn ${cat === 'all' ? 'active' : ''}"
                    data-filter="${escHtml(cat)}"
                    onclick="setFilter(this)">
                ${cat === 'all' ? 'All' : escHtml(cat)}
            </button>
        `).join('');
    }

    /* ── Filter button click ── */
    function setFilter(btn) {
        currentFilter = btn.dataset.filter;
        currentPage   = 1;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    /* ── Search + category filter ── */
    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();

        filteredTemplates = allTemplates.filter(t => {
            const matchesSearch = !search
                || t.displayName?.toLowerCase().includes(search)
                || t.category?.toLowerCase().includes(search)
                || t.description?.toLowerCase().includes(search)
                || (t.tags || []).some(tag => tag.toLowerCase().includes(search));

            const matchesFilter = currentFilter === 'all'
                || t.category?.toLowerCase() === currentFilter.toLowerCase();

            return matchesSearch && matchesFilter;
        });

        currentPage = 1;
        renderGrid();
        renderPagination();
    }

    /* ── Render grid ── */
    function renderGrid() {
        const grid = document.getElementById('templateGrid');
        document.getElementById('resultCount').textContent = filteredTemplates.length;

        if (filteredTemplates.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="state-icon">🔍</div>
                    <div class="state-title">No templates found</div>
                    <div class="state-sub">Try a different search term or filter.</div>
                </div>`;
            document.getElementById('pagination').style.display = 'none';
            return;
        }

        const start     = (currentPage - 1) * ITEMS_PER_PAGE;
        const pageItems = filteredTemplates.slice(start, start + ITEMS_PER_PAGE);
        grid.innerHTML  = pageItems.map((t, i) => buildCard(t, i)).join('');
    }

    /* ── Build card ── */
    function buildCard(t, i) {
        const tagsHtml = (t.tags || []).slice(0, 2)
            .map(tag => `<span class="tpl-tag-pill">${escHtml(tag)}</span>`)
            .join('');

        const skId = `sk-${i}`;
        const imgHtml = t.previewImage
            ? `<div class="img-skeleton" id="${skId}">
                   <div class="sk-icon">🖼</div>
                   <div class="sk-text">Loading...</div>
               </div>
               <img src="${escHtml(t.previewImage)}" alt="${escHtml(t.displayName)}" loading="lazy"
                    onload="document.getElementById('${skId}')?.remove()"
                    onerror="(function(el){if(el)el.innerHTML='<div class=sk-icon>🖼</div><div class=sk-text>No preview</div>'})(document.getElementById('${skId}'))" />`
            : `<div class="img-skeleton">
                   <div class="sk-icon">🖼</div>
                   <div class="sk-text">No preview</div>
               </div>`;

        const safePath  = escJs(t.puppeteerTemplatePath);
        const safeName  = escJs(t.templateName);
        const safeLabel = escJs(t.displayName);

        return `
            <div class="tpl-card" style="animation-delay:${i * 0.05}s"
                 onclick="goToPreview('${safePath}','${safeName}','${safeLabel}')">
                <div class="tpl-preview">
                    ${imgHtml}
                    <div class="preview-overlay">
                        <div class="ov-icon">👁</div>
                        <div class="ov-text">Click to Preview</div>
                    </div>
                </div>
                <div class="tpl-footer">
                    <div>
                        <div class="tpl-name">${escHtml(t.displayName)}</div>
                        <div class="tpl-category">${escHtml(t.category || '')}</div>
                        <div class="tpl-tags">${tagsHtml}</div>
                    </div>
                    <button class="preview-btn"
                        onclick="event.stopPropagation();goToPreview('${safePath}','${safeName}','${safeLabel}')">
                        Preview →
                    </button>
                </div>
            </div>`;
    }

    /* ── Navigate to templatePreview.html ── */
    function goToPreview(path, name, label) {
        const params = new URLSearchParams({ path, name, label });
        window.location.href = `templatePreview.html?${params.toString()}`;
    }

    /* ── Pagination ── */
    function renderPagination() {
        const totalPages = Math.ceil(filteredTemplates.length / ITEMS_PER_PAGE);
        const pg = document.getElementById('pagination');
        if (totalPages <= 1) { pg.style.display = 'none'; return; }
        pg.style.display = 'flex';

        let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
        for (let i = 1; i <= totalPages; i++) {
            if (i===1 || i===totalPages || (i>=currentPage-1 && i<=currentPage+1)) {
                html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
            } else if (i===currentPage-2 || i===currentPage+2) {
                html += `<span class="page-dots">…</span>`;
            }
        }
        html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>→</button>`;
        pg.innerHTML = html;
    }

    function goPage(page) {
        const totalPages = Math.ceil(filteredTemplates.length / ITEMS_PER_PAGE);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderGrid();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── Error state ── */
    function showError() {
        document.getElementById('templateGrid').innerHTML = `
            <div class="error-state">
                <div class="state-icon">⚠️</div>
                <div class="state-title">Couldn't load templates</div>
                <div class="state-sub">There was a problem connecting to the server. Please try again.</div>
                <button class="retry-btn" onclick="retryLoad()">Try Again</button>
            </div>`;
    }
    function retryLoad() {
        document.getElementById('templateGrid').innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <div class="state-sub">Loading templates...</div>
            </div>`;
        /* Also reset filter buttons while reloading */
        document.getElementById('filterButtons').innerHTML = '';
        loadAllTemplates();
    }

    /* ── Escape helpers ── */
    function escHtml(s) { return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
    function escJs(s)   { return String(s??'').replaceAll("'","\\'").replaceAll('"','\\"'); }

    /* ── Boot ── */
    loadAllTemplates();
</script>
</body>
</html>
