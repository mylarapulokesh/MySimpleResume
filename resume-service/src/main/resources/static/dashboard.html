<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>MySimpleResume | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0d0d12;
            --surface: rgba(20, 20, 35, 0.85);
            --border: rgba(255,255,255,0.07);
            --accent: #6c63ff;
            --accent2: #ff6584;
            --success: #10b981;
            --muted: #8b8fa8;
            --text: #e8e9f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ink);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── Background ── */
        .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(110px); opacity: 0.18; animation: floatOrb 14s ease-in-out infinite; }
        .orb-1 { width: 650px; height: 650px; background: radial-gradient(circle, #6c63ff, transparent 70%); top: -200px; left: -180px; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #ff6584, transparent 70%); bottom: -150px; right: -120px; animation-delay: -6s; }
        .orb-3 { width: 320px; height: 320px; background: radial-gradient(circle, #43e97b, transparent 70%); top: 40%; right: 18%; opacity: 0.09; animation-delay: -10s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0,0) scale(1); }
            33%  { transform: translate(30px,-40px) scale(1.05); }
            66%  { transform: translate(-20px,20px) scale(0.97); }
        }

        .bg-canvas::after {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* ── Particles ── */
        .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: rgba(255,255,255,0.35); border-radius: 50%; animation: riseUp linear infinite; }
        @keyframes riseUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            8%   { opacity: 1; } 92% { opacity: 1; }
            100% { transform: translateY(-5vh) scale(1); opacity: 0; }
        }

        /* ── Page layout ── */
        .page { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 36px 24px 80px; }

        /* ── Top nav ── */
        .topnav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 40px;
            animation: fadeUp 0.5s 0.05s both;
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            border-radius: 11px; display: flex; align-items: center; justify-content: center;
            font-size: 19px; box-shadow: 0 6px 20px rgba(108,99,255,0.4);
        }
        .brand-name { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }

        /* ── Logout ── */
        .logout-btn {
            background: rgba(244,63,94,0.12);
            border: 1.5px solid rgba(244,63,94,0.3);
            color: #f87171;
            border-radius: 12px; padding: 9px 20px;
            font-weight: 700; cursor: pointer; font-size: 0.84rem;
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 8px;
            overflow: hidden; min-width: 126px; justify-content: center;
            position: relative; font-family: 'Inter', sans-serif;
        }
        .logout-btn::after {
            content: ''; position: absolute; top: 0; left: 0;
            height: 100%; width: 0%;
            background: linear-gradient(135deg, #059652, #10b981);
            transition: width 1.95s ease; z-index: 0; border-radius: 11px;
        }
        .logout-btn.loading::after { width: 100%; }
        .logout-btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.45s ease; z-index: 1;
        }
        .logout-btn:hover::before { left: 100%; }
        .logout-btn:hover { background: rgba(244,63,94,0.22); border-color: rgba(244,63,94,0.55); color: #fff; transform: translateY(-1px); }
        .logout-btn.loading { pointer-events: none; transform: none; border-color: transparent; }

        .btn-arrow, .btn-text { position: relative; z-index: 2; transition: all 0.3s ease; }
        .logout-btn:hover .btn-arrow { transform: translateX(3px); }

        @keyframes wave {
            0%   { transform: rotate(0deg); }
            20%  { transform: rotate(20deg); }
            40%  { transform: rotate(-10deg); }
            60%  { transform: rotate(20deg); }
            80%  { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        .wave { display: inline-block; animation: wave 0.8s ease infinite; transform-origin: 70% 70%; }

        /* ── Page hero ── */
        .page-hero {
            text-align: center; margin-bottom: 40px;
            animation: fadeUp 0.5s 0.15s both;
        }
        .page-hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 6px; }

        .page-hero h1 .grad {
            background: linear-gradient(90deg, #6c63ff, #9b59f5, #ff6584);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-hero p { color: var(--muted); font-size: 0.9rem; font-weight: 300; }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px; padding: 28px;
            margin-bottom: 18px;
            backdrop-filter: blur(12px);
            animation: fadeUp 0.5s both;
        }
        .card:nth-child(1){ animation-delay:0.10s; }
        .card:nth-child(2){ animation-delay:0.15s; }
        .card:nth-child(3){ animation-delay:0.20s; }
        .card:nth-child(4){ animation-delay:0.25s; }
        .card:nth-child(5){ animation-delay:0.30s; }
        .card:nth-child(6){ animation-delay:0.35s; }
        .card:nth-child(7){ animation-delay:0.40s; }
        .card:nth-child(8){ animation-delay:0.45s; }

        /* ── Section title ── */
        .section-title {
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
            color: var(--accent);
        }
        .section-title .title-text {
            background: linear-gradient(90deg, #6c63ff, #9b59f5, #ff6584);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(to right, rgba(108,99,255,0.4), rgba(255,101,132,0.15), transparent);
        }

        /* ── Fields ── */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .row { display: flex; flex-direction: column; gap: 6px; }

        label { font-size: 0.77rem; font-weight: 600; color: var(--muted); letter-spacing: 0.03em; }

        input, textarea {
            padding: 11px 14px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.09);
            border-radius: 11px;
            color: #e8e9f0; font-size: 0.87rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
            color-scheme: dark;
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
        input:focus, textarea:focus {
            border-color: rgba(108,99,255,0.55);
            background: rgba(108,99,255,0.07);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }
        textarea { resize: vertical; min-height: 88px; }

        /* ── Dynamic blocks ── */
        .block {
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 18px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.025);
            transition: border-color 0.2s;
        }
        .block:hover { border-color: rgba(108,99,255,0.2); }
        .block-header { display: flex; justify-content: flex-end; margin-bottom: 10px; }

        /* ── Buttons ── */
        .ghost-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1.5px dashed rgba(108,99,255,0.4);
            border-radius: 10px;
            color: #a594ff; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .ghost-btn:hover { background: rgba(108,99,255,0.1); border-color: rgba(108,99,255,0.7); color: #fff; }

        .remove-btn {
            padding: 6px 14px;
            background: rgba(255, 101, 132, 0.12);
            border: 1px solid rgba(255, 101, 132, 0.22);
            border-radius: 999px;
            color: #fca5b5;
            font-size: 0.74rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }

        .remove-btn:hover {
            background: rgba(255, 101, 132, 0.2);
            border-color: rgba(255, 101, 132, 0.35);
            color: #fff;
            transform: translateY(-1px);
        }

        .inline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        /* ── Select Template button ── */
        .select-tpl-btn {
            width: 100%; padding: 14px 18px;
            background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(155,89,245,0.15));
            border: 1.5px solid rgba(108,99,255,0.3);
            border-radius: 13px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            transition: all 0.25s ease; position: relative; overflow: hidden;
            margin-bottom: 14px;
        }
        .select-tpl-btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
            transition: left 0.4s ease;
        }
        .select-tpl-btn:hover { background: linear-gradient(135deg, rgba(108,99,255,0.28), rgba(155,89,245,0.28)); border-color: rgba(108,99,255,0.6); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.22); }
        .select-tpl-btn:hover::before { left: 100%; }
        .select-tpl-btn.selected { background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(5,150,82,0.15)); border-color: rgba(16,185,129,0.4); }
        .select-tpl-btn.selected:hover { background: linear-gradient(135deg, rgba(16,185,129,0.25), rgba(5,150,82,0.25)); border-color: rgba(16,185,129,0.65); box-shadow: 0 8px 24px rgba(16,185,129,0.18); }

        .stl-left { display: flex; align-items: center; gap: 12px; }
        .stl-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.07); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
        .stl-label { font-size: 0.65rem; opacity: 0.55; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
        .stl-value { font-size: 0.9rem; font-weight: 700; }
        .stl-arrow { font-size: 1rem; opacity: 0.55; }

        /* ── Generate button ── */
        .generate-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #6c63ff, #9b59f5);
            border: none; border-radius: 13px;
            color: #fff; font-family: 'Inter', sans-serif;
            font-size: 0.97rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 28px rgba(108,99,255,0.32);
            position: relative; overflow: hidden;
        }
        .generate-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); opacity: 0; transition: opacity 0.3s; }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(108,99,255,0.48); }
        .generate-btn:hover::after { opacity: 1; }

        /* ── Status display ── */
        .status {
            margin-top: 14px; padding: 13px 18px; border-radius: 11px;
            text-align: center; font-weight: 600; font-size: 0.86rem;
            background: rgba(108,99,255,0.08);
            border: 1px solid rgba(108,99,255,0.14);
            color: #a594ff;
            user-select: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .page-hero h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="particles" id="particles"></div>

<div class="page">

    <!-- Top nav -->
    <div class="topnav">
        <div class="brand">
            <div class="brand-icon">📄</div>
            <div class="brand-name">MySimpleResume</div>
        </div>
        <button class="logout-btn" id="logoutBtn" onclick="handleLogout()">
            <span class="btn-arrow">→</span>
            <span class="btn-text">Sign Out</span>
        </button>
    </div>

    <!-- Hero -->
    <div class="page-hero">
        <h1>Build your <span class="grad">resume</span></h1>
        <p>Fill in your details and generate a stunning PDF in seconds ✨</p>
    </div>

    <!-- Personal Details -->
    <div class="card">
        <div class="section-title">👤 <span class="title-text">Personal Details</span></div>
        <div class="grid">
            <div class="row"><label>Full Name</label><input id="name" placeholder="Alex Doe" /></div>
            <div class="row"><label>Email</label><input id="email" placeholder="alex@example.com" /></div>
            <div class="row"><label>Phone</label><input id="phone" placeholder="+1 234 567 890" /></div>
            <div class="row"><label>Address</label><input id="address" placeholder="New York, USA" /></div>
        </div>
        <div class="row" style="margin-top:14px;">
            <label>Professional Summary</label>
            <textarea id="summary" placeholder="Describe your career highlights..."></textarea>
        </div>
    </div>

    <!-- Social Links -->
    <div class="card">
        <div class="section-title">🔗 <span class="title-text">Social Links</span></div>
        <div class="grid">
            <div class="row"><label>LinkedIn</label><input id="linkedin" placeholder="linkedin.com/in/username" /></div>
            <div class="row"><label>GitHub</label><input id="github" placeholder="github.com/username" /></div>
            <div class="row"><label>Portfolio</label><input id="portfolio" placeholder="yourportfolio.com" /></div>
        </div>
    </div>

    <!-- Skills -->
    <div class="card">
        <div class="section-title">⚡ <span class="title-text">Skills</span></div>
        <div id="skills"></div>
        <button class="ghost-btn" type="button" onclick="addSkill()">+ Add Skill</button>
    </div>

    <!-- Languages -->
    <div class="card">
        <div class="section-title">🌐 <span class="title-text">Languages</span></div>
        <div id="languages"></div>
        <button class="ghost-btn" type="button" onclick="addLanguage()">+ Add Language</button>
    </div>

    <!-- Projects -->
    <div class="card">
        <div class="section-title">🛠 <span class="title-text">Projects</span></div>
        <div id="projects"></div>
        <button class="ghost-btn" type="button" onclick="addProject()">+ Add Project</button>
    </div>

    <!-- Internships -->
    <div class="card">
        <div class="section-title">💼 <span class="title-text">Internships</span></div>
        <div id="internships"></div>
        <button class="ghost-btn" type="button" onclick="addInternship()">+ Add Internship</button>
    </div>

    <!-- Education -->
    <div class="card">
        <div class="section-title">🎓 <span class="title-text">Education</span></div>
        <div id="education"></div>
        <button class="ghost-btn" type="button" onclick="addEducation()">+ Add Education</button>
    </div>

    <!-- Template + Generate -->
    <div class="card">
        <div class="section-title">🖼 <span class="title-text">Template & Generate</span></div>

        <button class="select-tpl-btn" id="selectTplBtn" onclick="window.location.href='templates.html'">
            <div class="stl-left">
                <div class="stl-icon">🖼</div>
                <div>
                    <div class="stl-label">Template</div>
                    <div class="stl-value" id="stlValue">Select a Template</div>
                </div>
            </div>
            <span class="stl-arrow">→</span>
        </button>

        <button class="generate-btn" type="button" onclick="generateResume()">🚀 Generate PDF</button>

        <div id="status" class="status">✨ Ready to build!</div>
    </div>

</div>

<script>
    /* ── Particles ── */
    const pContainer = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*-18}s;`;
        pContainer.appendChild(p);
    }

    /* ── Logout ── */
    function handleLogout() {
        const btn = document.getElementById('logoutBtn');
        btn.querySelector('.btn-arrow').innerHTML = '<span class="wave">👋</span>';
        btn.querySelector('.btn-text').textContent = 'Bye!';
        btn.classList.add('loading');
        setTimeout(() => { localStorage.clear(); window.location.href = 'index.html'; }, 2050);
    }

    /* ── Load selected template ── */
    function loadSelectedTemplate() {
        const name = localStorage.getItem('selectedTemplateName');
        const btn  = document.getElementById('selectTplBtn');
        const val  = document.getElementById('stlValue');
        if (name) {
            val.textContent = name + ' ✓';
            btn.classList.add('selected');
        } else {
            val.textContent = 'Select a Template';
            btn.classList.remove('selected');
        }
    }
</script>

<script>
    const s = document.createElement('script');
    s.src = 'index.js?t=' + Date.now();
    document.head.appendChild(s);
</script>

<script>
    loadSelectedTemplate();
</script>

</body>
</html>
