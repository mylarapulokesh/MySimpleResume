<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Showcase Manager | MySimpleResume Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:     #0d0d12;
            --surface: rgba(20, 20, 35, 0.85);
            --border:  rgba(255,255,255,0.07);
            --accent:  #6c63ff;
            --accent2: #ff6584;
            --success: #10b981;
            --muted:   #8b8fa8;
            --text:    #e8e9f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--ink);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── Background orbs — identical to dashboard ── */
        .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(110px); opacity: 0.18; animation: floatOrb 14s ease-in-out infinite; }
        .orb-1 { width: 650px; height: 650px; background: radial-gradient(circle, #6c63ff, transparent 70%); top: -200px; left: -180px; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #ff6584, transparent 70%); bottom: -150px; right: -120px; animation-delay: -6s; }
        .orb-3 { width: 320px; height: 320px; background: radial-gradient(circle, #43e97b, transparent 70%); top: 40%; right: 18%; opacity: 0.09; animation-delay: -10s; }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0,0) scale(1); }
            33%  { transform: translate(30px,-40px) scale(1.05); }
            66%  { transform: translate(-20px,20px) scale(0.97); }
        }
        .bg-canvas::after {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* ── Particles — identical to dashboard ── */
        .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: rgba(255,255,255,0.35); border-radius: 50%; animation: riseUp linear infinite; }
        @keyframes riseUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            8%   { opacity: 1; } 92% { opacity: 1; }
            100% { transform: translateY(-5vh) scale(1); opacity: 0; }
        }

        /* ── Page layout ── */
        .page { position: relative; z-index: 10; max-width: 1100px; margin: 0 auto; padding: 36px 24px 80px; }

        /* ── Top nav — same structure as dashboard ── */
        .topnav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 40px;
            animation: fadeUp 0.5s 0.05s both;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            border-radius: 11px; display: flex; align-items: center; justify-content: center;
            font-size: 19px; box-shadow: 0 6px 20px rgba(108,99,255,0.4);
        }
        .brand-name { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }

        /* Admin badge — styled like dashboard's sign-out but in red/pink */
        .admin-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 20px;
            background: rgba(255,101,132,0.1);
            border: 1.5px solid rgba(255,101,132,0.28);
            border-radius: 12px;
            color: #ff9ab0; font-size: 0.84rem; font-weight: 700;
        }

        /* ── Page hero — same style as dashboard ── */
        .page-hero {
            text-align: center; margin-bottom: 36px;
            animation: fadeUp 0.5s 0.15s both;
        }
        .page-hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 6px; }
        .page-hero h1 .grad {
            background: linear-gradient(90deg, #6c63ff, #9b59f5, #ff6584);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-hero p { color: var(--muted); font-size: 0.9rem; font-weight: 300; line-height: 1.6; }

        /* ── Cards — same class names + styling as dashboard .card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px; padding: 22px 28px;
            margin-bottom: 18px;
            backdrop-filter: blur(12px);
            animation: fadeUp 0.5s both;
        }
        .card:nth-child(1){ animation-delay: 0.10s; }
        .card:nth-child(2){ animation-delay: 0.15s; }
        .card:nth-child(3){ animation-delay: 0.20s; }

        /* ── Section title — identical to dashboard ── */
        .section-title {
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
            color: var(--accent);
        }
        .section-title .title-text {
            background: linear-gradient(90deg, #6c63ff, #9b59f5, #ff6584);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(to right, rgba(108,99,255,0.4), rgba(255,101,132,0.15), transparent);
        }

        /* ── Counter row inside the card ── */
        .counter-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 16px; flex-wrap: wrap;
        }
        .counter-info { display: flex; align-items: center; gap: 12px; }
        .counter-dots { display: flex; gap: 6px; }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.1); transition: background 0.25s, box-shadow 0.25s;
        }
        .dot.filled {
            background: linear-gradient(135deg, #6c63ff, #9b59f5);
            box-shadow: 0 0 8px rgba(108,99,255,0.5);
        }
        .counter-text { font-size: 0.85rem; color: var(--muted); }
        .counter-text strong { color: #fff; }

        /* Save button — same style as dashboard's generate button */
        .save-btn {
            padding: 13px 28px;
            background: linear-gradient(135deg, #6c63ff, #9b59f5);
            border: none; border-radius: 13px;
            color: #fff; font-family: 'Inter', sans-serif;
            font-size: 0.92rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 28px rgba(108,99,255,0.32);
            display: flex; align-items: center; gap: 8px;
            position: relative; overflow: hidden;
        }
        .save-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); opacity: 0; transition: opacity 0.3s; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(108,99,255,0.48); }
        .save-btn:hover::after { opacity: 1; }
        .save-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
        .save-btn.saving { animation: pulse 1s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

        /* ── Search — same as dashboard inputs ── */
        .search-input-wrap {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.09);
            border-radius: 11px; padding: 11px 14px;
            margin-bottom: 0;
            transition: border-color 0.2s, box-shadow 0.2s;
            max-width: 360px;
        }
        .search-input-wrap:focus-within {
            border-color: rgba(108,99,255,0.55);
            background: rgba(108,99,255,0.07);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }
        .search-input-wrap input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.87rem;
            color-scheme: dark;
        }
        .search-input-wrap input::placeholder { color: rgba(255,255,255,0.2); }

        /* ── Template grid ── */
        .tpl-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 18px;
        }

        /* ── Template card — uses .block style from dashboard ── */
        .tpl-card {
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255,255,255,0.025);
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            position: relative; user-select: none;
        }
        .tpl-card:hover {
            border-color: rgba(108,99,255,0.35);
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.35);
            background: rgba(108,99,255,0.04);
        }
        .tpl-card.selected {
            border-color: rgba(108,99,255,0.7);
            background: rgba(108,99,255,0.07);
            box-shadow: 0 0 0 1px rgba(108,99,255,0.35), 0 14px 36px rgba(108,99,255,0.18);
        }
        .tpl-card.disabled {
            opacity: 0.35; cursor: not-allowed; pointer-events: none;
            filter: grayscale(0.4);
        }

        /* Tick circle */
        .tick {
            position: absolute; top: 10px; right: 10px;
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.18);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; background: rgba(0,0,0,0.45);
            transition: all 0.25s; z-index: 3;
        }
        .tpl-card.selected .tick {
            background: linear-gradient(135deg, #6c63ff, #9b59f5);
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(108,99,255,0.5);
        }

        /* Order badge */
        .order-badge {
            position: absolute; top: 10px; left: 10px;
            width: 22px; height: 22px; border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #9b59f5);
            display: none; align-items: center; justify-content: center;
            font-size: 0.68rem; font-weight: 800; color: #fff; z-index: 3;
            box-shadow: 0 3px 10px rgba(108,99,255,0.5);
        }
        .tpl-card.selected .order-badge { display: flex; }

        /* Preview image */
        .tpl-preview { width: 100%; height: 185px; position: relative; overflow: hidden; background: #12121e; }
        .tpl-preview img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; transition: transform 0.4s ease; }
        .tpl-card:hover .tpl-preview img { transform: scale(1.04); }
        .img-skeleton {
            position: absolute; inset: 0;
            background: linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%; animation: shimmer 1.4s ease infinite;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
        }
        @keyframes shimmer { 0%{background-position:200% center} 100%{background-position:-200% center} }
        .img-skeleton .sk-icon { font-size: 1.8rem; opacity: 0.12; }
        .img-skeleton .sk-text { font-size: 0.68rem; color: rgba(255,255,255,0.1); }

        /* Card body — same padding/font as dashboard .block fields */
        .tpl-body { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
        .tpl-name { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 3px; }
        .tpl-cat  { font-size: 0.68rem; color: var(--muted); margin-bottom: 7px; }
        .tpl-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .tpl-tag  { padding: 2px 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; font-size: 0.62rem; color: var(--muted); }

        /* ── Preview button + select pill on card footer ── */
        .tpl-footer { padding: 10px 14px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .preview-pill {
            padding: 6px 14px; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.28);
            border-radius: 8px; color: #a594ff; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; flex-shrink: 0;
        }
        .preview-pill:hover { background: rgba(108,99,255,0.25); border-color: rgba(108,99,255,0.55); color: #fff; }

        /* ── Preview modal ── */
        .modal-backdrop {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(8,8,14,0.88); backdrop-filter: blur(10px);
            align-items: center; justify-content: center; padding: 24px;
        }
        .modal-backdrop.open { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        .modal {
            background: rgba(18,18,30,0.98); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 26px; width: 100%; max-width: 880px; max-height: 90vh;
            display: flex; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            animation: popUp 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes popUp { from{opacity:0;transform:scale(0.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

        .modal-img-wrap { flex: 1; min-width: 0; background: #12121e; overflow-y: auto; }
        .modal-img-wrap img { width: 100%; display: block; }
        .modal-img-skeleton {
            width: 100%; min-height: 500px;
            background: linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%; animation: shimmer 1.4s ease infinite;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
        }
        .modal-img-skeleton .sk-icon { font-size: 3rem; opacity: 0.15; }
        .modal-img-skeleton .sk-text { font-size: 0.8rem; color: rgba(255,255,255,0.15); }

        .modal-panel {
            width: 280px; flex-shrink: 0; padding: 28px 24px;
            border-left: 1px solid rgba(255,255,255,0.07);
            display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
        }
        .modal-close {
            align-self: flex-end; width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: var(--muted); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .modal-close:hover { background: rgba(255,101,132,0.15); border-color: rgba(255,101,132,0.35); color: #fff; }
        .modal-cat-tag { display: inline-block; background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.25); color: #a594ff; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 50px; }
        .modal-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; color: #fff; line-height: 1.2; }
        .modal-title .grad { background: linear-gradient(90deg,#6c63ff,#ff6584); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .modal-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.6; }
        .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .modal-tag-pill { padding: 3px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; font-size: 0.68rem; color: var(--muted); }
        .modal-select-btn {
            width: 100%; padding: 13px; background: linear-gradient(135deg, #6c63ff, #9b59f5);
            border: none; border-radius: 12px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(108,99,255,0.3);
            margin-top: auto;
        }
        .modal-select-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,99,255,0.48); }
        .modal-select-btn.deselect { background: linear-gradient(135deg, #ff6584, #ff9a9e); box-shadow: 0 6px 20px rgba(255,101,132,0.3); }
        .modal-select-btn.deselect:hover { box-shadow: 0 10px 28px rgba(255,101,132,0.48); }
        .modal-select-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── States ── */
        .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 60px 20px; text-align: center; grid-column: 1/-1; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(108,99,255,0.2); border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-icon  { font-size: 2.5rem; opacity: 0.4; }
        .state-title { font-size: 0.95rem; font-weight: 700; color: #fff; }
        .state-sub   { font-size: 0.82rem; color: var(--muted); max-width: 300px; line-height: 1.5; }
        .retry-btn   { padding: 9px 22px; background: linear-gradient(135deg, #6c63ff, #9b59f5); border: none; border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; }

        /* ── Toast — same position + style as other pages ── */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600; z-index: 999;
            transition: transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.35s;
            opacity: 0; pointer-events: none; white-space: nowrap;
        }
        .toast.show  { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: rgba(255,101,132,0.15); border-color: rgba(255,101,132,0.3); color: #fca5b5; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @media (max-width: 640px) {
            .page-hero h1 { font-size: 1.75rem; }
            .tpl-grid { grid-template-columns: 1fr; }
            .counter-row { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="particles" id="particles"></div>

<div class="toast" id="toast"></div>


<!-- ── Preview Modal ── -->
<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
    <div class="modal" id="modal">
        <div class="modal-img-wrap" id="modalImgWrap">
            <div class="modal-img-skeleton" id="modalSkeleton">
                <div class="sk-icon">🖼</div>
                <div class="sk-text">Loading preview...</div>
            </div>
            <img id="modalImg" src="" alt="" style="display:none;" />
        </div>
        <div class="modal-panel">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-cat-tag" id="modalCat">Template</div>
            <div class="modal-title" id="modalTitle">Loading<span class="grad">...</span></div>
            <div class="modal-desc"  id="modalDesc"></div>
            <div class="modal-tags"  id="modalTags"></div>
            <button class="modal-select-btn" id="modalSelectBtn" onclick="modalToggle()">+ Add to Showcase</button>
        </div>
    </div>
</div>

<div class="page">

    <!-- Top nav — same layout as dashboard -->
    <div class="topnav">
        <div class="brand">
            <div class="brand-icon">📄</div>
            <div class="brand-name">MySimpleResume</div>
        </div>
        <div class="admin-badge">⚙️ Admin Panel</div>
    </div>

    <!-- Hero — same style as dashboard -->
    <div class="page-hero">
        <h1>Manage <span class="grad">Showcase</span> Templates</h1>
        <p>Select up to <strong style="color:#fff">7 templates</strong> to display on the templates page. Click to toggle. Selection order = display order.</p>
    </div>

    <!-- Counter + Save — card style matching dashboard -->
    <div class="card">
        <div class="section-title">📊 <span class="title-text">Showcase Slots</span></div>
        <div class="counter-row">
            <div class="counter-info">
                <div class="counter-dots" id="counterDots"></div>
                <div class="counter-text"><strong id="selectedCount">0</strong> / 7 selected</div>
            </div>
            <button class="save-btn" id="saveBtn" onclick="saveShowcase()" disabled>
                💾 Save Showcase
            </button>
        </div>
    </div>

    <!-- Search + Grid — card style matching dashboard -->
    <div class="card">
        <div class="section-title">🖼 <span class="title-text">All Templates</span></div>

        <div class="search-input-wrap" style="margin-bottom:20px;">
            <span style="opacity:0.4;">🔍</span>
            <input type="text" id="searchInput" placeholder="Search by name, category or tag..." oninput="renderGrid()" />
        </div>

        <div class="tpl-grid" id="templateGrid">
            <div class="state-box">
                <div class="spinner"></div>
                <div class="state-sub">Loading templates...</div>
            </div>
        </div>
    </div>

</div>

<script>
    /* ── Particles — same as dashboard ── */
    const pContainer = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*-18}s;`;
        pContainer.appendChild(p);
    }

    const BASE_URL = "http://localhost:8080";
    const MAX = 7;
    let allTemplates  = [];
    let selectedNames = [];   // ordered list of templateName values

    /* ── Boot ──
     * 1. Fetch /get/all/templates → show every template
     * 2. Fetch /get/showcase/templates → pre-tick currently active ones
     */
    async function init() {
        try {
            const allRes  = await fetch(`${BASE_URL}/get/all/templates`);
            if (!allRes.ok) throw new Error('Failed to load templates');
            const allData = await allRes.json();
            allTemplates  = allData.allTemplates || [];

            try {
                const showRes  = await fetch(`${BASE_URL}/get/showcase/templates`);
                const showData = showRes.ok ? await showRes.json() : {};
                const current  = showData.showcaseTemplates || showData.allTemplates || [];
                selectedNames  = current.map(t => t.templateName).filter(Boolean);
            } catch (_) {
                selectedNames = [];
            }

            renderGrid();
            renderCounter();

        } catch (err) {
            document.getElementById('templateGrid').innerHTML = `
                <div class="state-box">
                    <div class="state-icon">⚠️</div>
                    <div class="state-title">Failed to load</div>
                    <div class="state-sub">${escHtml(err.message)}</div>
                    <button class="retry-btn" onclick="init()">Try Again</button>
                </div>`;
        }
    }

    /* ── Render grid ── */
    function renderGrid() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const grid   = document.getElementById('templateGrid');

        const visible = allTemplates.filter(t =>
            !search
            || t.displayName?.toLowerCase().includes(search)
            || t.category?.toLowerCase().includes(search)
            || (t.tags || []).some(tag => tag.toLowerCase().includes(search))
        );

        if (visible.length === 0) {
            grid.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">No results</div></div>`;
            return;
        }

        grid.innerHTML = visible.map(t => buildCard(t)).join('');
    }

    /* ── Build one card ── */
    function buildCard(t) {
        const isSelected = selectedNames.includes(t.templateName);
        const order      = isSelected ? selectedNames.indexOf(t.templateName) + 1 : null;
        const isDisabled = !isSelected && selectedNames.length >= MAX;

        const tagsHtml = (t.tags || []).slice(0, 2)
            .map(tag => `<span class="tpl-tag">${escHtml(tag)}</span>`).join('');

        const skId = `sk-${escHtml(t.templateName)}`;
        const imgHtml = t.previewImage
            ? `<div class="img-skeleton" id="${skId}"><div class="sk-icon">🖼</div><div class="sk-text">Loading...</div></div>
               <img src="${escHtml(t.previewImage)}" alt="${escHtml(t.displayName)}" loading="lazy"
                    onload="document.getElementById('${skId}')?.remove()"
                    onerror="(function(el){if(el)el.innerHTML='<div class=sk-icon>🖼</div><div class=sk-text>No preview</div>'})(document.getElementById('${skId}'))" />`
            : `<div class="img-skeleton"><div class="sk-icon">🖼</div><div class="sk-text">No preview</div></div>`;

        return `
            <div class="tpl-card ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}">
                <div class="order-badge">${order ?? ''}</div>
                <div class="tick">${isSelected ? '✓' : ''}</div>
                <div class="tpl-preview" onclick="toggleTemplate('${escJs(t.templateName)}')">${imgHtml}</div>
                <div class="tpl-body" onclick="toggleTemplate('${escJs(t.templateName)}')">
                    <div class="tpl-name">${escHtml(t.displayName)}</div>
                    <div class="tpl-cat">${escHtml(t.category || '')}</div>
                    <div class="tpl-tags">${tagsHtml}</div>
                </div>
                <div class="tpl-footer">
                    <button class="preview-pill"
                        onclick="openModal('${escJs(t.templateName)}')">
                        👁 Preview
                    </button>
                    <button class="preview-pill" style="background:${isSelected ? 'rgba(255,101,132,0.15)' : 'rgba(108,99,255,0.12)'}; border-color:${isSelected ? 'rgba(255,101,132,0.35)' : 'rgba(108,99,255,0.28)'}; color:${isSelected ? '#fca5b5' : '#a594ff'};"
                        onclick="toggleTemplate('${escJs(t.templateName)}')">
                        ${isSelected ? '✓ Selected' : '+ Select'}
                    </button>
                </div>
            </div>`;
    }

    /* ── Toggle ── */
    function toggleTemplate(templateName) {
        const idx = selectedNames.indexOf(templateName);
        if (idx > -1) {
            selectedNames.splice(idx, 1);
        } else {
            if (selectedNames.length >= MAX) {
                showToast(`Maximum ${MAX} templates allowed`, true);
                return;
            }
            selectedNames.push(templateName);
        }
        renderGrid();
        renderCounter();
        updateModalBtn();  // keep modal button in sync if modal is open
    }

    /* ── Counter dots — 7 dots like dashboard radio style ── */
    function renderCounter() {
        const count = selectedNames.length;
        document.getElementById('selectedCount').textContent = count;
        document.getElementById('counterDots').innerHTML = Array.from({ length: MAX }, (_, i) =>
            `<div class="dot ${i < count ? 'filled' : ''}"></div>`
        ).join('');
        document.getElementById('saveBtn').disabled = count === 0;
    }

    /* ── Save showcase ──
     * POST /save/showcase/templates
     * Body: { templateNames: ["resumeTemplate01", ...] }
     */
    async function saveShowcase() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.classList.add('saving');
        btn.innerHTML = '⏳ Saving...';

        try {
            const res = await fetch(`${BASE_URL}/save/showcase/templates`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ templateNames: selectedNames }),
            });
            if (!res.ok) {
                const msg = await res.text();
                throw new Error(msg || 'Server error');
            }
            showToast('✓ Showcase saved successfully!', false);
        } catch (err) {
            showToast('Failed to save: ' + err.message, true);
        } finally {
            btn.disabled = selectedNames.length === 0;
            btn.classList.remove('saving');
            btn.innerHTML = '💾 Save Showcase';
        }
    }

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg, isError = false) {
        const el = document.getElementById('toast');
        clearTimeout(toastTimer);
        el.textContent = msg;
        el.className   = `toast ${isError ? 'error' : ''} show`;
        toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
    }

    function escHtml(s) { return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
    function escJs(s)   { return String(s??'').replaceAll("'","\\'").replaceAll('"','\\"'); }


    /* ── current template open in modal ── */
    let modalTemplateName = null;

    function openModal(templateName) {
        const t = allTemplates.find(x => x.templateName === templateName);
        if (!t) return;
        modalTemplateName = templateName;

        /* Reset image */
        const img  = document.getElementById('modalImg');
        const skel = document.getElementById('modalSkeleton');
        img.style.display = 'none';
        skel.style.display = 'flex';
        img.src = '';

        /* Populate text */
        document.getElementById('modalCat').textContent   = t.category || 'Template';
        document.getElementById('modalTitle').innerHTML   = escHtml(t.displayName) + '<span class="grad">.</span>';
        document.getElementById('modalDesc').textContent  = t.description || 'A professionally designed resume template.';
        document.getElementById('modalTags').innerHTML    = (t.tags || [])
            .map(tag => `<span class="modal-tag-pill">${escHtml(tag)}</span>`).join('');

        /* Load image */
        if (t.previewImage) {
            img.onload  = () => { skel.style.display = 'none'; img.style.display = 'block'; };
            img.onerror = () => { skel.innerHTML = '<div class=sk-icon>🖼</div><div class=sk-text>No preview</div>'; };
            img.src = t.previewImage;
        } else {
            skel.innerHTML = '<div class="sk-icon">🖼</div><div class="sk-text">No preview</div>';
        }

        updateModalBtn();
        document.getElementById('modalBackdrop').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modalBackdrop').classList.remove('open');
        document.body.style.overflow = '';
        modalTemplateName = null;
    }

    function handleBackdropClick(e) {
        if (e.target === document.getElementById('modalBackdrop')) closeModal();
    }

    /* Toggle from inside the modal */
    function modalToggle() {
        if (!modalTemplateName) return;
        toggleTemplate(modalTemplateName);
        updateModalBtn();
    }

    /* Update modal button label + style based on current selection state */
    function updateModalBtn() {
        if (!modalTemplateName) return;
        const btn        = document.getElementById('modalSelectBtn');
        const isSelected = selectedNames.includes(modalTemplateName);
        const atMax      = !isSelected && selectedNames.length >= MAX;

        btn.textContent = isSelected ? '✓ Remove from Showcase' : '+ Add to Showcase';
        btn.className   = 'modal-select-btn' + (isSelected ? ' deselect' : '');
        btn.disabled    = atMax;
        if (atMax) btn.textContent = `Max ${MAX} reached`;
    }

    /* Keyboard ESC to close */
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    init();
</script>
</body>
</html>
